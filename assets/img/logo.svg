<!-- assets/img/logo.svg -->
<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title>Schlauarbeit Logo</title>
  <desc>Grünes Rund-Icon mit abstrahiertem Blatt</desc>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16A34A"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <filter id="s" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,.15)"/>
    </filter>
  </defs>

  <!-- Token -->
  <circle cx="24" cy="24" r="20" fill="url(#g)" filter="url(#s)"/>

  <!-- Blatt -->
  <path d="M24 12c-7 2-13 9-11 16 2 8 10 10 16 8 7-2 11-8 9-16-2-8-8-10-14-8z"
        fill="#FCFFFD" opacity=".98"/>
  <!-- Mittelrippe -->
  <path d="M24 14v20" stroke="#16A34A" stroke-width="2" stroke-linecap="round" opacity=".7"/>
  <!-- Seitenadern -->
  <path d="M24 22c-4 0-7 3-9 5M24 26c-3 0-5 2-7 4M24 18c3 0 6 2 8 4M24 30c2 0 4 1 6 3"
        stroke="#16A34A" stroke-width="1.6" stroke-linecap="round" opacity=".5"/>

  <!-- kleiner Technik-Touch: “Nut”/Sechseck unten rechts -->
  <polygon points="34,30 36,31.2 36,33.8 34,35 32,33.8 32,31.2"
           fill="#0F241A" opacity=".18"/>
  <circle cx="34" cy="32.5" r="0.9" fill="#0F241A" opacity=".25"/>
</svg>
