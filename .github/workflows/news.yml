name: Build Klima-News (alle 2h)
on:
  schedule:
    - cron: "5 */2 * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: node aggregator/index.mjs
      - name: Commit news.json wenn geändert
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/news.json
          git diff --cached --quiet || git commit -m "chore(news): update $(date -u +'%F %T UTC')"
          git push
