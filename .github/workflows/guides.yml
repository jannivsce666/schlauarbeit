name: Update DIY Guides

on:
  schedule:
    - cron: '25 */2 * * *'   # alle 2h zur Minute 25
  workflow_dispatch:

permissions:
  contents: write   # wichtig: damit pushen erlaubt ist

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci || npm i

      - name: Generate guides.json
        run: npm run update:guides

      - name: Commit & push guides.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/guides.json
          git diff --quiet -- assets/data/guides.json && { echo "Nothing to commit"; exit 0; }
          BRANCH="${{ github.ref_name }}"
          git checkout "$BRANCH"
          git commit -m "chore(ci): refresh guides.json [skip ci]"
          git push origin "$BRANCH"
